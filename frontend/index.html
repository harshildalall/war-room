Dear Appeals Review Board,

I am writing to formally request a redetermination of the denial of coverage for Skilled Nursing Facility (SNF) care following my hospitalization at Cedars-Sinai Medical Center (Discharge date: March 25, 2026).

I. STATEMENT OF APPEAL

UnitedHealthcare Medicare Advantage denied my claim for SNF care on March 28, 2026, citing "not medically necessary — patient deemed stable for discharge." This denial is improper for the following reasons:

II. LEGAL BASIS FOR COVERAGE

Federal law requires UnitedHealthcare Medicare Advantage to provide coverage that is at least equivalent to Traditional Medicare. Under Medicare NCD 100.2 and 42 CFR § 409.30, SNF coverage is required when:

  (1) The patient has a qualifying 3-day inpatient hospital stay ✓ (March 22–25, 2026)

• Treating physician Dr. [Physician] documented medical necessity for continued skilled nursing observation due to post-surgical wound management and insulin-dependent diabetes (Type 2, uncontrolled, ICD-10 E11.649).
• Comorbid diabetes significantly complicates post-fracture healing and requires daily nursing assessment.
• Patient does not have family support sufficient for safe home discharge.

IV. CONTROLLING PRECEDENT

Medicare Appeals Council Decision M-18-1122 overturned an identical SNF denial under nearly identical facts, finding that a Medicare Advantage plan may not apply a stricter "stability" standard than CMS's functional improvement test. See also: Jimmo v. Sebelius, 2013 (Medicare SNF coverage does not require improvement, only maintenance).

V. CONTRACT VIOLATION

UHC's denial applies a "stability" standard not permitted under CMS guidelines. Medicare Advantage plans are prohibited from imposing coverage limitations more restrictive than Traditional Medicare (42 CFR § 422.101(b)(1)).

VI. REQUESTED REMEDY

I request full reversal of this denial and approval of SNF coverage for the medically necessary duration, retroactive to March 25, 2026. I am prepared to escalate to Qualified Independent Contractor review if this redetermination is denied.

// ── LIVE BACKEND HELPERS ────────────────────────────────────────────────────
async function apiJson(path, options = {}) {
  const response = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    ...options,
  });
  if (!response.ok) {
    let detail = `${response.status} ${response.statusText}`;
    try {
      const body = await response.json();
      detail = body.detail || detail;
    } catch (_) {}
    throw new Error(detail);
  }
  return response.json();
}

function getLiveRemedy(caseResult) {
  const strategy = caseResult?.appeal_strategy;
  return strategy?.agent_recommended_remedy || 'full_overturn';
}

function getLiveVerification(caseResult) {

// ── SCREEN 3: WAR ROOM ───────────────────────────────────────────────────────
function WarRoom({ onNext, backendRunning, backendStatus }) {
  const [agentPhase, setAgentPhase] = useState(0); // which agent is active
  const [agentLines, setAgentLines] = useState(Array(5).fill(0)); // lines shown per agent
  const [agentDone, setAgentDone] = useState(Array(5).fill(false));
  const [evidenceCount, setEvidenceCount] = useState(0);
  const [factsCount, setFactsCount] = useState(0);
  const [doneCount, setDoneCount] = useState(0);
  const [showNext, setShowNext] = useState(false);
  const [citFeed, setCitFeed] = useState([]);
  const [elapsed, setElapsed] = useState(0);

  const CITS = [
    { src: "CMS NCD 100.2", text: "SNF coverage requires qualifying 3-day hospital stay", type: "federal_policy" },
    { src: "LCD L34049 (Noridian)", text: "Daily skilled nursing care is medically necessary post-surgery with comorbidities", type: "local_coverage" },
    { src: "Appeals Council M-18-1122", text: "MA plan may not apply stricter standard than Traditional Medicare", type: "precedent" },
    { src: "Jimmo v. Sebelius (2013)", text: "Coverage doesn't require improvement — maintenance suffices", type: "case_law" },
    { src: "UHC CPB 0187", text: "Plan requires NCD criteria met — criteria ARE met per records", type: "insurer_bulletin" },
  ];

  useEffect(() => {
    let t = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    const schedule = [];
    let time = 600;
    AGENTS.forEach((agent, ai) => {
      // Start agent
      schedule.push([time, () => setAgentPhase(ai)]);
      // Add lines
      agent.steps.forEach((_, li) => {
        time += 380 + li * 80;
        schedule.push([time, () => setAgentLines(prev => { const n=[...prev]; n[ai]=li+1; return n; })]);
      });
      // Mark done
      time += 300;
      schedule.push([time, () => {
        setAgentDone(prev => { const n=[...prev]; n[ai]=true; return n; });
        setDoneCount(c => c + 1);
        const factBumps = [0, 0, 4, 0, 0];
        const evidBumps = [0, 3, 0, 5, 0];
        setFactsCount(c => c + factBumps[ai]);
        setEvidenceCount(c => c + evidBumps[ai]);
      }]);
      // Add citations for agents 3b and 4
      if (ai === 3) {
        CITS.slice(0,3).forEach((c, ci) => {
          time += 200;
          schedule.push([time + ci*300, () => setCitFeed(f => [...f, c])]);
        });
      }
      if (ai === 4) {
        CITS.slice(3).forEach((c, ci) => {
          time += 200;
          schedule.push([time + ci*300, () => setCitFeed(f => [...f, c])]);
        });
      }
      time += 500;
    });
    // All done
    schedule.push([time + 500, () => setShowNext(true)]);

    const timers = schedule.map(([delay, fn]) => setTimeout(fn, delay));
    return () => timers.forEach(clearTimeout);
  }, []);

  const citColors = { federal_policy: 'var(--blue)', local_coverage: 'oklch(60% 0.18 290)', precedent: 'var(--amber)', case_law: 'var(--red)', insurer_bulletin: 'var(--green)' };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--war-bg)', color: 'var(--war-text)', fontFamily: "'DM Sans', sans-serif", display: 'flex', flexDirection: 'column' }}>
      {/* Top bar */}
      <div style={{ padding: '16px 32px', borderBottom: '1px solid var(--war-border)', display: 'flex', alignItems: 'center', gap: 24, flexWrap: 'wrap' }}>
        <Logo dark />
        <div style={{ flex: 1 }}></div>
        <div style={{ display: 'flex', gap: 24, alignItems: 'center', flexWrap: 'wrap' }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, color: 'var(--war-dim)', marginBottom: 2 }}>Case</div>
            <div style={{ fontSize: 14, fontWeight: 600 }}>{MOCK_CASE.denied.substring(0, 28)}…</div>
          </div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, color: 'var(--war-dim)', marginBottom: 2 }}>Deadline</div>
            <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--amber)' }}>{MOCK_CASE.deadline}</div>
          </div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1, color: 'var(--war-dim)', marginBottom: 2 }}>Elapsed</div>
            <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{String(Math.floor(elapsed/60)).padStart(2,'0')}:{String(elapsed%60).padStart(2,'0')}</div>
          </div>
        </div>
      </div>

      {/* Progress header */}
      <div style={{ padding: '20px 32px', display: 'flex', alignItems: 'center', gap: 32, borderBottom: '1px solid var(--war-border)', flexWrap: 'wrap' }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1.5, color: 'var(--war-dim)', marginBottom: 10 }}>Analysis progress</div>
          <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
            {AGENTS.map((agent, ai) => (
              <div key={agent.id} style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 5 }}>
                <div style={{ height: 6, borderRadius: 3, background: agentDone[ai] ? agent.color : agentPhase === ai ? 'oklch(35% 0.04 255)' : 'var(--war-panel)', transition: 'background 0.5s', overflow: 'hidden', position: 'relative' }}>
                  {agentPhase === ai && !agentDone[ai] && (
                    <div style={{ position: 'absolute', inset: 0, background: `linear-gradient(90deg, transparent, ${agent.color}55, transparent)`, backgroundSize: '200% 100%', animation: 'shimmer 1.4s infinite' }}></div>
                  )}
                </div>
                <div style={{ fontSize: 9, color: agentDone[ai] ? agent.color : agentPhase === ai ? 'var(--war-text)' : 'var(--war-dim)', fontWeight: agentPhase === ai || agentDone[ai] ? 600 : 400, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{agent.name}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 28 }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontFamily: 'DM Serif Display', fontSize: 36, color: 'var(--green)', lineHeight: 1 }}>{evidenceCount}</div>
            <div style={{ fontSize: 11, color: 'var(--war-dim)', marginTop: 3 }}>citations found</div>
          </div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontFamily: 'DM Serif Display', fontSize: 36, color: 'var(--amber)', lineHeight: 1 }}>{factsCount}</div>
            <div style={{ fontSize: 11, color: 'var(--war-dim)', marginTop: 3 }}>facts extracted</div>
          </div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontFamily: 'DM Serif Display', fontSize: 36, color: 'var(--blue)', lineHeight: 1 }}>{doneCount}/5</div>
            <div style={{ fontSize: 11, color: 'var(--war-dim)', marginTop: 3 }}>agents done</div>
          </div>
        </div>
        {showNext && (
          <Btn onClick={backendRunning ? undefined : onNext} variant="blue" size="md" disabled={backendRunning} style={{ animation: 'fadeIn 0.5s both' }}>
            {backendRunning ? 'Generating real appeal…' : 'Choose My Strategy →'}
          </Btn>
        )}
      </div>
      {backendStatus && (
        <div style={{ padding: '10px 32px', borderBottom: '1px solid var(--war-border)', color: backendStatus.type === 'error' ? 'var(--red)' : 'var(--war-dim)', fontSize: 13 }}>
          {backendStatus.message}
        </div>
      )}

      {/* Main grid */}
      <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr 1fr 280px', gap: 0, overflow: 'hidden' }}>
        {/* 5 agent panels */}
        {AGENTS.map((agent, ai) => {
          const isActive = agentPhase === ai && !agentDone[ai];
          const isDone = agentDone[ai];
          const isWaiting = agentPhase < ai;
          return (
            <div key={agent.id} style={{
              borderRight: '1px solid var(--war-border)',
              padding: '20px 18px',
              display: 'flex', flexDirection: 'column',
              opacity: isWaiting ? 0.4 : 1,
              transition: 'opacity 0.4s',
              background: isActive ? 'oklch(14% 0.03 255)' : 'transparent',
            }}>
              {/* Agent header */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: isDone ? 'var(--green)' : isActive ? agent.color : 'var(--war-dim)', animation: isActive ? 'pulse 1s infinite' : 'none' }}></div>
                  <span style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: 'var(--war-dim)', textTransform: 'uppercase', letterSpacing: 1 }}>{elapsed < 2 && !isDone && !isActive ? 'waiting' : isDone ? 'done' : isActive ? 'working' : 'queued'}</span>
                </div>
                <div style={{ fontWeight: 700, fontSize: 15, color: isDone ? agent.color : isActive ? 'white' : 'var(--war-dim)', marginBottom: 2 }}>{agent.name}</div>
                <div style={{ fontSize: 12, color: 'var(--war-dim)', lineHeight: 1.4 }}>{agent.tagline}</div>
              </div>

              {/* Status */}
              <div style={{ flex: 1, fontFamily: "'JetBrains Mono', monospace", fontSize: 11, lineHeight: 1.8 }}>
                {agent.steps.slice(0, agentLines[ai]).map((line, li) => (
                  <div key={li} style={{ color: li === agentLines[ai]-1 && !isDone ? 'white' : 'var(--war-dim)', animation: 'slideIn 0.3s both', display: 'flex', gap: 6 }}>
                    <span style={{ color: isDone && li === agent.steps.length-1 ? 'var(--green)' : 'var(--war-dim)' }}>›</span>
                    <span style={{ wordBreak: 'break-word' }}>{line}</span>
                  </div>
                ))}
                {isActive && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: agent.color, marginTop: 4 }}>
                    <div className="spinner" style={{ borderColor: agent.color, borderTopColor: 'transparent' }}></div>
                    <span>working…</span>
                  </div>
                )}
                {isDone && (
                  <div style={{ marginTop: 8, padding: '8px 12px', background: 'oklch(20% 0.04 155)', borderRadius: 8, fontSize: 11, color: 'var(--green)', fontWeight: 600 }}>DONE</div>
                )}
              </div>
            </div>
          );
        })}

        {/* Citation feed */}
        <div style={{ padding: '20px 18px', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1.5, color: 'var(--war-dim)', marginBottom: 16 }}>Evidence Feed</div>
          <div style={{ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column', gap: 10 }}>
            {citFeed.length === 0 && (
              <div style={{ color: 'var(--war-dim)', fontSize: 12, fontStyle: 'italic' }}>Waiting for agents…</div>
            )}
            {citFeed.map((c, i) => (
              <div key={i} style={{ padding: '12px', background: 'var(--war-panel)', borderRadius: 10, borderLeft: `3px solid ${citColors[c.type] || 'var(--blue)'}`, animation: 'slideIn 0.4s both' }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: citColors[c.type] || 'var(--blue)', marginBottom: 4, textTransform: 'uppercase', letterSpacing: 0.5 }}>{c.type.replace(/_/g,' ')}</div>
                <div style={{ fontSize: 12, fontWeight: 600, color: 'white', marginBottom: 4 }}>{c.src}</div>
                <div style={{ fontSize: 11, color: 'var(--war-dim)', lineHeight: 1.5 }}>{c.text}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('landing');
  const [caseResult, setCaseResult] = useState(null);
  const [backendRunning, setBackendRunning] = useState(false);
  const [backendStatus, setBackendStatus] = useState(null);

  useEffect(() => {
    apiJson('/api/latest')
      .then(setCaseResult)
      .catch(() => {});
  }, []);

  async function startAnalysis() {
    setScreen('warroom');
    setBackendRunning(true);
    setBackendStatus({ type: 'info', message: 'Running real Counterclaim backend agents…' });
    try {
      const result = await apiJson('/api/run-demo', { method: 'POST' });
      setCaseResult(result);
      setBackendStatus({ type: 'success', message: 'Backend appeal packet generated from live agent artifacts.' });
    } catch (err) {
      console.error(err);
      setBackendStatus({ type: 'error', message: `Backend run failed: ${err.message}. Showing latest generated demo artifacts.` });
      try {
        const latest = await apiJson('/api/latest');
        setCaseResult(latest);
      } catch (_) {}
    } finally {
      setBackendRunning(false);
    }
  }

  const screens = {
    landing: <Landing onNext={() => setScreen('upload')} onSignIn={() => setScreen('profile')} />,
    upload: <Upload onNext={startAnalysis} />,
    warroom: <WarRoom onNext={() => setScreen('remedy')} backendRunning={backendRunning} backendStatus={backendStatus} />,
    remedy: <Remedy onNext={() => setScreen('letter')} />,
    letter: <Letter onHistory={() => setScreen('history')} onProfile={() => setScreen('profile')} caseResult={caseResult} />,
    history: <History onNew={() => setScreen('landing')} onProfile={() => setScreen('profile')} />,
    profile: <Profile onBack={() => setScreen('history')} onNewCase={() => setScreen('landing')} />,
  };

  return screens[screen] || screens.landing;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
